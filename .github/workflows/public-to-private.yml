name: Public to Private Sync
on:
  issues:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment } = context.payload;
            const repoOpts = { owner: 'bluetux', repo: 'heartfulness' };

            // [무한루프 방지] 매니저가 쓴 댓글이나 이미 동기화된 이슈는 무시
            if (comment && comment.body.includes('**[Manager]**')) return;
            if (issue.title.includes('[#')) return;

            if (context.eventName === 'issues') {
              if (action === 'opened') {
                await github.rest.issues.create({
                  ...repoOpts,
                  title: issue.title,
                  body: `사용자 제보 원본: ${issue.html_url}\n\n${issue.body}`
                });
              } else {
                await github.rest.issues.update({
                  ...repoOpts,
                  issue_number: issue.number,
                  state: issue.state
                });
              }
            } else if (context.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                ...repoOpts,
                issue_number: issue.number,
                body: `**[Public] ${comment.user.login}:**\n\n${comment.body}`
              });
            }
