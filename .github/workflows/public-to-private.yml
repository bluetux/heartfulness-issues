name: Public to Private Sync
on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment, sender } = context.payload;
            const targetRepo = { owner: 'bluetux', repo: 'heartfulness' };

            if (sender.type === 'Bot') return;
            if (comment && comment.body.includes('> **[Manager]**')) return;

            // [1] 마커로 연결된 Private 이슈 번호 추출
            const match = (issue.body ?? '').match(/private-origin: https:\/\/github\.com\/[^/]+\/[^/]+\/issues\/(\d+)/);
            
            // [2] 댓글 동기화 (연결된 이슈가 있을 때만)
            if (context.eventName === 'issue_comment' && match) {
              const privateNum = parseInt(match[1], 10);
              await github.rest.issues.createComment({
                ...targetRepo,
                issue_number: privateNum,
                body: `> **[Public]** _@${sender.login}_\n\n${comment.body}`
              });
            } 
            
            // [3] 이슈 본체 동기화
            else if (context.eventName === 'issues') {
              const labels = issue.labels ? issue.labels.map(l => l.name) : [];
              
              if (action === 'opened' && !match) {
                // Public에서 새로 생성된 이슈 -> Private에 새로 생성
                const { data: newPrivate } = await github.rest.issues.create({
                  ...targetRepo,
                  title: `[Public] ${issue.title}`,
                  body: `${issue.body ?? ''}\n\n`,
                  labels
                });

                // 생성 후 Public 이슈 본문에 Private 마커를 박아서 연결 (중요!)
                const newMarker = ``;
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `${issue.body ?? ''}\n\n${newMarker}`
                });
              } else if (match) {
                // 이미 연결된 이슈면 상태 업데이트
                const privateNum = parseInt(match[1], 10);
                await github.rest.issues.update({
                  ...targetRepo,
                  issue_number: privateNum,
                  title: issue.title,
                  state: issue.state,
                  labels
                });
              }
            }
