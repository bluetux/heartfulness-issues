name: Public to Private Sync
on:
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment } = context.payload;
            const repoOpts = { owner: 'bluetux', repo: 'heartfulness' };

            // [절대 규칙] 작성자가 Bot이면 즉시 종료 (무한 루프 방지)
            if (comment && comment.user.type === 'Bot') return;

            await github.rest.issues.createComment({
              ...repoOpts,
              issue_number: issue.number,
              body: `**[Public] ${comment.user.login}:**\n\n${comment.body}`
            });
