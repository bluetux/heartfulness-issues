name: Public to Private Sync
on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment, sender } = context.payload;
            const target = { owner: 'bluetux', repo: 'heartfulness' };

            // 봇이거나 이미 동기화 마커가 있으면 종료 (무한 루프 방어)
            if (sender.type === 'Bot' || (issue.body && issue.body.includes(''))) return;
            if (comment && comment.body.includes('')) return;

            // 본문에서 연결된 이슈 ID 추출
            const match = (issue.body || '').match(/private-id: #(\d+)/);
            const privateNumber = match ? parseInt(match[1], 10) : null;

            if (context.eventName === 'issue_comment' && privateNumber) {
              await github.rest.issues.createComment({
                ...target,
                issue_number: privateNumber,
                body: `${comment.body}\n\n\n> **[Public]** _@${sender.login}_`
              });
            } else if (context.eventName === 'issues') {
              if (action === 'opened' && !privateNumber) {
                // 1. Private에 생성
                const { data: newPrivate } = await github.rest.issues.create({
                  ...target,
                  title: `[Public] ${issue.title}`,
                  body: `${issue.body ?? ''}\n\n\n`,
                  labels: issue.labels.map(l => l.name)
                });
                
                // 2. Public 본문에 연결 고리 업데이트
                // (이 업데이트가 연쇄 반응을 일으키려면 ISSUE_SYNC가 강력한 PAT여야 해!)
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `${issue.body ?? ''}\n\n\n`
                });
              } else if (privateNumber) {
                await github.rest.issues.update({
                  ...target,
                  issue_number: privateNumber,
                  title: `[Public] ${issue.title.replace(/^\[Public\]\s*/, '')}`,
                  state: issue.state,
                  labels: issue.labels.map(l => l.name)
                });
              }
            }
