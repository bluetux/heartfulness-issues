name: Public to Private Sync

on:
  issue_comment:
    types: [created]
  issues:
    types: [closed, reopened, edited] # 편집까지 추적하도록 추가

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment, sender } = context.payload;
            const target = { owner: 'bluetux', repo: 'heartfulness' };

            // 1. [철저한 루프 차단]
            // - 봇이 한 일은 무조건 패스
            // - 내가 관리자로 단 댓글([Manager])이 다시 돌아오는 것 방지
            if (sender.type === 'Bot') return;
            if (comment && comment.body.includes('> **[Manager]**')) return;

            // 2. [동기화 대상 판별]
            // 본문에서 private-origin 마커 추출
            const bodyText = issue.body || '';
            const match = bodyText.match(/private-origin: https:\/\/github\.com\/[^/]+\/[^/]+\/issues\/(\d+)/);

            if (!match) {
              console.log('이 이슈는 Public 전용이거나 마커가 없습니다. 동기화를 스킵합니다.');
              return;
            }

            const privateIssueNumber = parseInt(match[1], 10);

            // 3. [케이스 1: 댓글 동기화]
            if (context.eventName === 'issue_comment') {
              try {
                await github.rest.issues.createComment({
                  ...target,
                  issue_number: privateIssueNumber,
                  body: `> **[Public User]** _@${sender.login}_\n\n${comment.body}`
                });
              } catch (err) {
                console.error('Private 댓글 생성 실패:', err.message);
              }
            }

            // 4. [케이스 2: 이슈 상태 및 본문 수정 동기화]
            else if (context.eventName === 'issues') {
              // Public에서 유저가 이슈를 닫거나 다시 열었을 때, 혹은 본문을 수정했을 때
              try {
                await github.rest.issues.update({
                  ...target,
                  issue_number: privateIssueNumber,
                  state: issue.state,
                  // 필요하다면 title: issue.title 도 추가 가능 (선택사항)
                });
                console.log(`Private #${privateIssueNumber} 상태 동기화 완료: ${issue.state}`);
              } catch (err) {
                console.error('Private 상태 업데이트 실패:', err.message);
              }
            }
