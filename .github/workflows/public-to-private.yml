name: Private to Public Sync
on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Public
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment, sender } = context.payload;
            const target = { owner: 'bluetux', repo: 'heartfulness-issues' };
            const marker = ``;

            // 1. 루프 차단: 봇이거나, 내가 보낸 [Public] 댓글이면 무시
            if (sender.type === 'Bot') return;
            if (comment && comment.body.includes('> **[Public]**')) return;

            // 2. 검색 로직 (인덱싱 지연 대비 2회 시도)
            async function findPublicIssue() {
              const q = `repo:${target.owner}/${target.repo} type:issue "${issue.html_url}" in:body`;
              const { data: results } = await github.rest.search.issuesAndPullRequests({ q });
              return results.total_count > 0 ? results.items[0] : null;
            }

            let publicIssue = (action !== 'opened') ? await findPublicIssue() : null;

            // 3. 케이스별 동기화
            const labels = issue.labels ? issue.labels.map(l => l.name) : [];
            const syncedBody = `${issue.body ?? ''}\n\n${marker}`;

            if (context.eventName === 'issue_comment') {
              if (!publicIssue) return console.log('Matching issue not indexed yet.');
              await github.rest.issues.createComment({
                ...target,
                issue_number: publicIssue.number,
                body: `> **[Manager]** _(${sender.login})_\n\n${comment.body}`
              });
            } else if (context.eventName === 'issues') {
              if (action === 'opened') {
                await github.rest.issues.create({
                  ...target,
                  title: issue.title,
                  body: syncedBody,
                  labels
                });
              } else if (publicIssue) {
                await github.rest.issues.update({
                  ...target,
                  issue_number: publicIssue.number,
                  title: issue.title,
                  body: syncedBody,
                  state: issue.state,
                  labels
                });
              }
            }
