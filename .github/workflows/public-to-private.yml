name: Public to Private Sync
on:
  issue_comment:
    types: [created]
  issues:
    types: [closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { issue, comment, sender } = context.payload;
            const target = { owner: 'bluetux', repo: 'heartfulness' };

            // 1. 루프 차단: 봇이거나, 내가 보낸 [Manager] 댓글이면 무시
            if (sender.type === 'Bot') return;
            if (comment && comment.body.includes('> **[Manager]**')) return;

            // 2. 원본 번호 추출 (정규식 강화: 공백/포맷 유연성)
            const match = (issue.body ?? '').match(/private-origin: https:\/\/github\.com\/[^/]+\/[^/]+\/issues\/(\d+)/);
            if (!match) return console.log('Non-synced issue, skip.');
            
            const privateNumber = parseInt(match[1], 10);

            // 3. 댓글 동기화
            if (context.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                ...target,
                issue_number: privateNumber,
                body: `> **[Public]** _@${sender.login}_\n\n${comment.body}`
              });
            } 
            // 4. 상태 동기화
            else if (context.eventName === 'issues') {
              await github.rest.issues.update({
                ...target,
                issue_number: privateNumber,
                state: issue.state
              });
            }
