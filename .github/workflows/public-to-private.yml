name: Public to Private Sync
on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment, sender } = context.payload;
            const target = { owner: 'bluetux', repo: 'heartfulness' };

            // [방어막 1] 봇이거나, 본문에 Private에서 넘어온 마커가 있으면 절대 실행 안 함
            if (sender.type === 'Bot') return;
            if (issue.body && issue.body.includes('')) return;
            
            // [방어막 2] 동기화 댓글 차단
            const isSyncComment = comment && (
              comment.body.includes('[Manager]') || 
              comment.body.includes('[Public]') || 
              comment.body.includes('')
            );
            if (isSyncComment) return;

            const match = (issue.body ?? '').match(/from-private: https:\/\/github\.com\/[^/]+\/[^/]+\/issues\/(\d+)/);

            if (context.eventName === 'issue_comment' && match) {
              await github.rest.issues.createComment({
                ...target,
                issue_number: parseInt(match[1], 10),
                body: `**[Public]** _@${sender.login}_:\n\n${comment.body}\n\n`
              });
            } else if (context.eventName === 'issues') {
              const labels = issue.labels.map(l => l.name);
              
              if (action === 'opened' && !match) {
                // Public 신규 이슈 -> Private에 생성
                const { data: newPrivate } = await github.rest.issues.create({
                  ...target,
                  title: `[Public] ${issue.title}`,
                  body: `${issue.body ?? ''}\n\n`,
                  labels
                });

                // 생성 직후 Public 이슈 본문에 Private 주소 마커 삽입 (이 업데이트는 위 방어막에서 걸러짐)
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `${issue.body ?? ''}\n\n`
                });
              } else if (match) {
                // 기존 이슈 업데이트 (제목에서 [Public] 중복 방지)
                const cleanTitle = issue.title.replace(/^\[Public\]\s*/, '');
                await github.rest.issues.update({
                  ...target,
                  issue_number: parseInt(match[1], 10),
                  title: `[Public] ${cleanTitle}`,
                  state: issue.state,
                  labels
                });
              }
            }
