name: Public to Private Sync
on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Private
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC }}
          script: |
            const { action, issue, comment, sender } = context.payload;
            const target = { owner: 'bluetux', repo: 'heartfulness' };

            // [1] 루프 차단: 봇이거나, 동기화된 댓글([Manager])이면 즉시 종료
            if (sender.type === 'Bot') return;
            if (comment && comment.body.includes('> **[Manager]**')) return;

            // [2] 마커 확인 및 Private 번호 추출
            const match = (issue.body ?? '').match(/private-origin: https:\/\/github\.com\/[^/]+\/[^/]+\/issues\/(\d+)/);
            if (!match) return console.log('동기화 대상이 아닙니다.');
            
            const privateNumber = parseInt(match[1], 10);

            // [3] 실행 분기
            if (context.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                ...target,
                issue_number: privateNumber,
                body: `> **[Public]** _@${sender.login}_\n\n${comment.body}`
              });
            } else if (context.eventName === 'issues') {
              // Public에서 사용자가 수정한 상태/라벨을 Private에 반영
              const labels = issue.labels ? issue.labels.map(l => l.name) : [];
              await github.rest.issues.update({
                ...target,
                issue_number: privateNumber,
                state: issue.state,
                labels: labels
              });
            }
